{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Home</h1>
    <p>Welcome to the File Management System</p>
</div>

<div class="content-section">
    <div class="card">
        <h3>System Overview</h3>
        <p>This system allows you to manage files and view them in an organized manner.</p>
        <div class="quick-stats">
            <div class="stat-item">
                <span class="stat-number">0</span>
                <span class="stat-label">Total Files</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">0</span>
                <span class="stat-label">Selected Files</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">0</span>
                <span class="stat-label">Displayed Files</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
