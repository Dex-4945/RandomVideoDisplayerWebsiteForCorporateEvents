<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>File System</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('file_manager') }}" class="nav-link">File Manager</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('viewer') }}" class="nav-link">Viewer</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2025 File Management System</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% if request.endpoint == 'file_manager' %}
    <script src="{{ url_for('static', filename='js/file-manager.js') }}"></script>
    {% endif %}
    {% if request.endpoint == 'viewer' %}
    <script src="{{ url_for('static', filename='js/viewer.js') }}"></script>
    {% endif %}
</body>
</html>
